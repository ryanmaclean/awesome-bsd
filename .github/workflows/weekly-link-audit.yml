name: weekly-link-audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run full markdown link audit
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml "**/*.md" "**/*.markdown"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
