name: docs-quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "lychee.toml"
      - ".github/workflows/docs-quality.yml"
  push:
    branches:
      - master
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "lychee.toml"
      - ".github/workflows/docs-quality.yml"

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown whitespace
        shell: sh
        run: |
          failed=0
          for file in $(git ls-files "*.md" "*.markdown"); do
            previous_blank=0
            line_number=0
            while IFS= read -r line || [ -n "$line" ]; do
              line_number=$((line_number + 1))
              case "$line" in
                *[[:blank:]])
                  printf "%s:%s: trailing whitespace\n" "$file" "$line_number"
                  failed=1
                  ;;
              esac
              if [ -z "$line" ]; then
                if [ "$previous_blank" -eq 1 ]; then
                  printf "%s:%s: repeated blank line\n" "$file" "$line_number"
                  failed=1
                fi
                previous_blank=1
              else
                previous_blank=0
              fi
            done < "$file"
          done
          exit "$failed"

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml "**/*.md" "**/*.markdown"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
